<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuaderno de Tensión</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF para exportar a PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        /* Ocultar elementos visuales al imprimir si se usara el navegador */
        @media print {
            .no-print { display: none !important; }
        }
        /* Transiciones suaves */
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Estilos del interruptor (Toggle) */
        .toggle-checkbox:checked { right: 0; border-color: #22c55e; }
        .toggle-checkbox:checked + .toggle-label { background-color: #22c55e; }
        .toggle-checkbox { right: 0; z-index: 1; border-color: #e5e7eb; transition: all 0.3s; }
        .toggle-label { width: 3rem; height: 1.5rem; background-color: #e5e7eb; border-radius: 9999px; transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased pb-20 select-none">

    <!-- Encabezado -->
    <header class="bg-white shadow-sm px-4 py-4 sticky top-0 z-20 flex justify-center items-center">
        <svg class="w-6 h-6 text-red-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
        <h1 class="text-xl font-bold text-gray-800">Mi Tensión</h1>
    </header>

    <!-- Pestaña 1: Registro / Calendario -->
    <main id="view-registro" class="page active max-w-md mx-auto p-4 space-y-4">
        
        <!-- VISTA CALENDARIO -->
        <div id="calendar-section" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
            <div class="flex justify-between items-center mb-4">
                <button onclick="changeMonth(-1)" class="p-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <h2 id="calendar-month-year" class="font-bold text-lg text-gray-700 capitalize">Mes Año</h2>
                <button onclick="changeMonth(1)" class="p-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
            
            <div class="grid grid-cols-7 gap-1 text-center text-xs font-semibold text-gray-500 mb-2">
                <div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center">
                <!-- Días generados por JS -->
            </div>
            <p class="text-center text-xs text-gray-400 mt-4">Pulsa un día para añadir o ver registros</p>
        </div>

        <!-- Últimas 3 mediciones -->
        <div id="latest-records-section" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
            <h3 class="font-bold text-gray-800 mb-3 text-sm flex items-center">
                <svg class="w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Últimas 3 mediciones
            </h3>
            <div id="latest-records-list" class="space-y-3">
                <!-- Generado por JS -->
            </div>
        </div>

        <!-- VISTA FORMULARIO DIARIO (Oculta por defecto) -->
        <div id="form-section" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-4 space-y-5">
            <div class="flex items-center justify-between border-b pb-3">
                <button onclick="closeForm()" class="text-blue-600 font-medium flex items-center text-sm">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Volver
                </button>
                <h2 id="form-date-title" class="font-bold text-gray-800">Fecha</h2>
            </div>

            <!-- Tabla de tomas -->
            <div>
                <div class="grid grid-cols-4 text-center text-xs font-semibold text-gray-500 mb-2">
                    <div class="text-left pl-1">Toma</div><div>Alta</div><div>Baja</div><div>Pulso</div>
                </div>
                <div class="space-y-2">
                    <!-- Toma 1 -->
                    <div class="grid grid-cols-4 gap-2 items-center">
                        <div class="text-sm font-bold text-gray-400">1ª</div>
                        <input type="number" id="sys-0" oninput="calculateAverages()" class="w-full text-center bg-gray-50 border border-gray-200 rounded-lg p-2 text-lg focus:ring-2 focus:ring-blue-300 outline-none" placeholder="-">
                        <input type="number" id="dia-0" oninput="calculateAverages()" class="w-full text-center bg-gray-50 border border-gray-200 rounded-lg p-2 text-lg focus:ring-2 focus:ring-blue-300 outline-none" placeholder="-">
                        <input type="number" id="pul-0" oninput="calculateAverages()" class="w-full text-center bg-gray-50 border border-gray-200 rounded-lg p-2 text-lg focus:ring-2 focus:ring-blue-300 outline-none" placeholder="-">
                    </div>
                    <!-- Toma 2 -->
                    <div class="grid grid-cols-4 gap-2 items-center">
                        <div class="text-sm font-bold text-gray-400">2ª</div>
                        <input type="number" id="sys-1" oninput="calculateAverages()" class="w-full text-center bg-gray-50 border border-gray-200 rounded-lg p-2 text-lg focus:ring-2 focus:ring-blue-300 outline-none" placeholder="-">
                        <input type="number" id="dia-1" oninput="calculateAverages()" class="w-full text-center bg-gray-50 border border-gray-200 rounded-lg p-2 text-lg focus:ring-2 focus:ring-blue-300 outline-none" placeholder="-">
                        <input type="number" id="pul-1" oninput="calculateAverages()" class="w-full text-center bg-gray-50 border border-gray-200 rounded-lg p-2 text-lg focus:ring-2 focus:ring-blue-300 outline-none" placeholder="-">
                    </div>
                    <!-- Toma 3 -->
                    <div class="grid grid-cols-4 gap-2 items-center">
                        <div class="text-sm font-bold text-gray-400">3ª</div>
                        <input type="number" id="sys-2" oninput="calculateAverages()" class="w-full text-center bg-gray-50 border border-gray-200 rounded-lg p-2 text-lg focus:ring-2 focus:ring-blue-300 outline-none" placeholder="-">
                        <input type="number" id="dia-2" oninput="calculateAverages()" class="w-full text-center bg-gray-50 border border-gray-200 rounded-lg p-2 text-lg focus:ring-2 focus:ring-blue-300 outline-none" placeholder="-">
                        <input type="number" id="pul-2" oninput="calculateAverages()" class="w-full text-center bg-gray-50 border border-gray-200 rounded-lg p-2 text-lg focus:ring-2 focus:ring-blue-300 outline-none" placeholder="-">
                    </div>
                </div>
            </div>

            <!-- Medias -->
            <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 grid grid-cols-4 items-center">
                <div class="text-sm font-bold text-blue-800">Media</div>
                <div id="avg-sys" class="text-center font-bold text-xl text-blue-900">-</div>
                <div id="avg-dia" class="text-center font-bold text-xl text-blue-900">-</div>
                <div id="avg-pul" class="text-center font-bold text-xl text-blue-900">-</div>
            </div>

            <!-- Indicador en tiempo real -->
            <div id="bp-indicator" class="hidden"></div>

            <!-- Medicación y Guardar -->
            <div class="flex items-center justify-between bg-gray-50 p-4 rounded-xl border border-gray-200">
                <span class="font-medium text-gray-700">¿Pastilla tomada?</span>
                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="meds-toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                    <label for="meds-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
            </div>

            <button onclick="saveRecord()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition-colors text-lg">
                Guardar Día
            </button>
        </div>
    </main>

    <!-- Pestaña 2: Historial -->
    <main id="view-historial" class="page max-w-md mx-auto p-4 space-y-3">
        <h2 class="font-bold text-xl text-gray-800 mb-4 px-1">Historial</h2>
        <div id="history-list" class="space-y-3">
            <!-- Rellenado por JS -->
        </div>
    </main>

    <!-- Pestaña 3: PDF y Copias -->
    <main id="view-opciones" class="page max-w-md mx-auto p-4 space-y-6">
        
        <!-- Exportar PDF -->
        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
            <h2 class="font-bold text-gray-800 text-lg mb-4 flex items-center">
                <svg class="w-5 h-5 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Exportar Informe (PDF)
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Desde fecha:</label>
                    <input type="date" id="pdf-from" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Hasta fecha:</label>
                    <input type="date" id="pdf-to" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 outline-none focus:border-blue-500">
                </div>
                <button onclick="generatePDF()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-xl shadow transition-colors flex justify-center items-center">
                    Crear PDF
                </button>
            </div>
        </div>

        <!-- Copia de Seguridad -->
        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
            <h2 class="font-bold text-gray-800 text-lg mb-4 flex items-center">
                <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                Copia de Seguridad
            </h2>
            <div class="space-y-3">
                <button onclick="exportBackup()" class="w-full border-2 border-blue-600 text-blue-600 font-bold py-3 rounded-xl hover:bg-blue-50 transition-colors">
                    Exportar Datos (.json)
                </button>
                
                <div class="relative">
                    <input type="file" id="import-file" accept=".json" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="importBackup(event)">
                    <button class="w-full border-2 border-gray-300 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-50 transition-colors pointer-events-none">
                        Importar Datos (.json)
                    </button>
                </div>
                <p class="text-xs text-gray-400 text-center mt-1">Al importar, se añadirán a tus datos actuales.</p>
            </div>
        </div>

    </main>

    <!-- Navegación Inferior -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around no-print shadow-[0_-2px_10px_rgba(0,0,0,0.05)] z-20 max-w-md left-1/2 transform -translate-x-1/2">
        <button onclick="switchTab('registro')" id="nav-registro" class="nav-btn text-blue-600 flex flex-col items-center justify-center w-full py-3">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-xs font-bold">Calendario</span>
        </button>
        <button onclick="switchTab('historial')" id="nav-historial" class="nav-btn text-gray-400 flex flex-col items-center justify-center w-full py-3">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            <span class="text-xs font-bold">Historial</span>
        </button>
        <button onclick="switchTab('opciones')" id="nav-opciones" class="nav-btn text-gray-400 flex flex-col items-center justify-center w-full py-3">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <span class="text-xs font-bold">PDF / Datos</span>
        </button>
    </nav>

    <!-- Script de lógica de la aplicación -->
    <script>
        // --- ESTADO DE LA APLICACIÓN ---
        let records = JSON.parse(localStorage.getItem('tensionData')) || {};
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let selectedDateStr = null;

        const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        // --- NAVEGACIÓN DE PESTAÑAS ---
        function switchTab(tabName) {
            // Ocultar todas las páginas
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            // Mostrar la seleccionada
            document.getElementById(`view-${tabName}`).classList.add('active');
            
            // Actualizar colores de los botones
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-blue-600');
                btn.classList.add('text-gray-400');
            });
            document.getElementById(`nav-${tabName}`).classList.remove('text-gray-400');
            document.getElementById(`nav-${tabName}`).classList.add('text-blue-600');

            // Acciones específicas al entrar a una pestaña
            if (tabName === 'historial') renderHistory();
            if (tabName === 'opciones') setDefaultDates();
            if (tabName === 'registro') renderCalendar();
        }

        // --- CALENDARIO ---
        function renderCalendar() {
            const monthYearEl = document.getElementById('calendar-month-year');
            const gridEl = document.getElementById('calendar-grid');
            gridEl.innerHTML = '';
            
            monthYearEl.textContent = `${meses[currentMonth]} ${currentYear}`;
            
            // Primer día del mes y número de días
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            // Ajustar para que la semana empiece en Lunes (0 = Lunes, 6 = Domingo)
            let startDay = firstDay - 1;
            if (startDay === -1) startDay = 6; // Domingo

            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            // Espacios en blanco al inicio
            for (let i = 0; i < startDay; i++) {
                gridEl.innerHTML += `<div class="p-2"></div>`;
            }

            // Días del mes
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const hasData = records[dateStr] ? true : false;
                const isToday = dateStr === todayStr;
                
                let btnClasses = "relative w-10 h-10 mx-auto flex items-center justify-center rounded-full text-sm font-medium transition-colors cursor-pointer ";
                
                if (isToday) btnClasses += "bg-blue-100 text-blue-800 font-bold border-2 border-blue-500 ";
                else btnClasses += "hover:bg-gray-100 text-gray-700 ";

                let dotHtml = hasData ? `<span class="absolute bottom-1 w-1.5 h-1.5 bg-green-500 rounded-full"></span>` : '';

                gridEl.innerHTML += `
                    <div class="py-1">
                        <div onclick="openForm('${dateStr}')" class="${btnClasses}">
                            ${day}
                            ${dotHtml}
                        </div>
                    </div>
                `;
            }
            
            renderLatestRecords(); // Actualizar la lista de últimas mediciones
        }

        function changeMonth(dir) {
            currentMonth += dir;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        }

        // --- ÚLTIMAS 3 MEDICIONES ---
        function renderLatestRecords() {
            const listEl = document.getElementById('latest-records-list');
            listEl.innerHTML = '';
            
            // Ordenar por fecha de forma descendente y obtener las 3 más recientes
            const dates = Object.keys(records).sort((a, b) => new Date(b) - new Date(a)).slice(0, 3);
            
            if (dates.length === 0) {
                listEl.innerHTML = '<p class="text-xs text-gray-400 text-center py-2">No hay mediciones aún.</p>';
                return;
            }

            dates.forEach(dateStr => {
                const data = records[dateStr];
                const p = dateStr.split('-');
                const formattedDate = `${p[2]}/${p[1]}/${p[0]}`;
                const hora = data.hora || '--:--';
                
                listEl.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100 cursor-pointer hover:bg-gray-200 transition-colors" onclick="openForm('${dateStr}')">
                        <div class="text-sm flex flex-col gap-1">
                            <span class="font-bold text-gray-700">📅 ${formattedDate}</span>
                            <span class="text-xs text-gray-500">🕒 ${hora}</span>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-gray-900">❤️ ${data.avgSys || '-'} <span class="text-gray-400 font-normal mx-1">/</span> 💙 ${data.avgDia || '-'}</div>
                            <div class="text-xs text-gray-500 mt-1">❤️‍🩹 Pulso: ${data.avgPul || '-'}</div>
                        </div>
                    </div>
                `;
            });
        }

        // --- FORMULARIO DIARIO ---
        function openForm(dateStr) {
            selectedDateStr = dateStr;
            document.getElementById('calendar-section').classList.add('hidden');
            document.getElementById('latest-records-section').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
            
            // Formatear título (ej. 26 de Junio de 2026)
            const d = new Date(dateStr);
            document.getElementById('form-date-title').textContent = `${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;

            // Limpiar inputs
            for(let i=0; i<3; i++) {
                document.getElementById(`sys-${i}`).value = '';
                document.getElementById(`dia-${i}`).value = '';
                document.getElementById(`pul-${i}`).value = '';
            }
            document.getElementById('meds-toggle').checked = false;

            // Cargar datos si existen
            if (records[dateStr]) {
                const data = records[dateStr];
                for(let i=0; i<3; i++) {
                    if (data.tomas[i]) {
                        document.getElementById(`sys-${i}`).value = data.tomas[i].sys || '';
                        document.getElementById(`dia-${i}`).value = data.tomas[i].dia || '';
                        document.getElementById(`pul-${i}`).value = data.tomas[i].pul || '';
                    }
                }
                document.getElementById('meds-toggle').checked = data.meds || false;
            }
            calculateAverages();
        }

        function closeForm() {
            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('calendar-section').classList.remove('hidden');
            document.getElementById('latest-records-section').classList.remove('hidden');
            renderCalendar(); // Refrescar por si añadimos datos (aparece el punto)
        }

        function calculateAverages() {
            let sysSum = 0, diaSum = 0, pulSum = 0;
            let sysCount = 0, diaCount = 0, pulCount = 0;

            for(let i=0; i<3; i++) {
                let sys = parseInt(document.getElementById(`sys-${i}`).value);
                let dia = parseInt(document.getElementById(`dia-${i}`).value);
                let pul = parseInt(document.getElementById(`pul-${i}`).value);

                if (!isNaN(sys) && sys > 0) { sysSum += sys; sysCount++; }
                if (!isNaN(dia) && dia > 0) { diaSum += dia; diaCount++; }
                if (!isNaN(pul) && pul > 0) { pulSum += pul; pulCount++; }
            }

            const sysVal = sysCount > 0 ? Math.round(sysSum / sysCount) : null;
            const diaVal = diaCount > 0 ? Math.round(diaSum / diaCount) : null;
            const pulVal = pulCount > 0 ? Math.round(pulSum / pulCount) : null;

            document.getElementById('avg-sys').textContent = sysVal || '-';
            document.getElementById('avg-dia').textContent = diaVal || '-';
            document.getElementById('avg-pul').textContent = pulVal || '-';

            // Actualizar indicador de salud en tiempo real
            const indicatorEl = document.getElementById('bp-indicator');
            if (sysVal && diaVal) {
                indicatorEl.classList.remove('hidden');
                let status, msg, colorClasses;
                
                // Lógica de validación según el requerimiento
                if (sysVal >= 140 || diaVal >= 90 || sysVal <= 90 || diaVal <= 50) {
                    status = '🔴';
                    msg = 'Tensión elevada. Se recomienda revisarla o consultar con un profesional si persiste.';
                    colorClasses = 'bg-red-50 text-red-800 border-red-200';
                } else if (sysVal >= 120 && sysVal <= 130 && diaVal >= 70 && diaVal <= 80) {
                    status = '🟢';
                    msg = 'Tensión dentro del rango recomendado.';
                    colorClasses = 'bg-green-50 text-green-800 border-green-200';
                } else {
                    status = '🟡';
                    msg = 'Tensión ligeramente fuera del rango recomendado.';
                    colorClasses = 'bg-yellow-50 text-yellow-800 border-yellow-200';
                }

                indicatorEl.className = `rounded-xl p-3 text-sm font-medium border flex items-start gap-2 transition-colors ${colorClasses}`;
                indicatorEl.innerHTML = `<span class="text-xl leading-none mt-0.5">${status}</span> <p>${msg}</p>`;
            } else {
                indicatorEl.classList.add('hidden');
            }
        }

        function saveRecord() {
            const tomas = [];
            for(let i=0; i<3; i++) {
                tomas.push({
                    sys: document.getElementById(`sys-${i}`).value,
                    dia: document.getElementById(`dia-${i}`).value,
                    pul: document.getElementById(`pul-${i}`).value
                });
            }
            
            const avgSys = document.getElementById('avg-sys').textContent;
            const avgDia = document.getElementById('avg-dia').textContent;

            // Si todo está vacío (media es '-'), borramos el registro si existía, o no guardamos
            if (avgSys === '-' && avgDia === '-') {
                if (records[selectedDateStr]) {
                    delete records[selectedDateStr];
                    localStorage.setItem('tensionData', JSON.stringify(records));
                }
                closeForm();
                return;
            }

            // Registrar la hora actual si es un registro nuevo (o conservar la anterior)
            const horaActual = new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'});
            const horaGuardada = (records[selectedDateStr] && records[selectedDateStr].hora) 
                ? records[selectedDateStr].hora 
                : horaActual;

            const data = {
                tomas: tomas,
                avgSys: avgSys !== '-' ? parseInt(avgSys) : null,
                avgDia: avgDia !== '-' ? parseInt(avgDia) : null,
                avgPul: document.getElementById('avg-pul').textContent !== '-' ? parseInt(document.getElementById('avg-pul').textContent) : null,
                meds: document.getElementById('meds-toggle').checked,
                hora: horaGuardada
            };

            records[selectedDateStr] = data;
            localStorage.setItem('tensionData', JSON.stringify(records));
            
            // Efecto visual simple
            alert('Registro guardado correctamente');
            closeForm();
        }

        // --- HISTORIAL ---
        function renderHistory() {
            const listEl = document.getElementById('history-list');
            listEl.innerHTML = '';

            const dates = Object.keys(records).sort((a, b) => new Date(b) - new Date(a)); // Descendente

            if (dates.length === 0) {
                listEl.innerHTML = `<div class="text-center p-8 text-gray-400">No hay registros guardados.</div>`;
                return;
            }

            dates.forEach(dateStr => {
                const data = records[dateStr];
                const parts = dateStr.split('-');
                const formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                
                const medsHtml = data.meds 
                    ? `<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs font-bold border border-green-200">Pastilla</span>` 
                    : ``;

                listEl.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between" onclick="switchTab('registro'); setTimeout(()=>openForm('${dateStr}'), 100)">
                        <div>
                            <div class="font-bold text-gray-800">${formattedDate}</div>
                            <div class="flex gap-2 mt-1 items-center">
                                <span class="text-xs text-gray-500">Pulso: ${data.avgPul || '-'}</span>
                                ${medsHtml}
                            </div>
                        </div>
                        <div class="text-xl font-black text-gray-900 bg-gray-50 px-3 py-2 rounded-lg border border-gray-200">
                            ${data.avgSys || '-'}/${data.avgDia || '-'}
                        </div>
                    </div>
                `;
            });
        }

        // --- OPCIONES (PDF Y BACKUP) ---
        function setDefaultDates() {
            const dates = Object.keys(records).sort();
            const today = new Date().toISOString().split('T')[0];
            
            document.getElementById('pdf-to').value = today;
            if (dates.length > 0) {
                document.getElementById('pdf-from').value = dates[0];
            } else {
                document.getElementById('pdf-from').value = today;
            }
        }

        function generatePDF() {
            if (!window.jspdf || !window.jspdf.jsPDF) {
                alert("Error al cargar la librería PDF. Necesitas conexión a internet.");
                return;
            }

            const fromDate = document.getElementById('pdf-from').value;
            const toDate = document.getElementById('pdf-to').value;
            
            const filteredDates = Object.keys(records)
                .filter(d => d >= fromDate && d <= toDate)
                .sort();

            if (filteredDates.length === 0) {
                alert("No hay registros en el rango de fechas seleccionado.");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Título
            doc.setFontSize(16);
            doc.text("Cuaderno de Tensión Arterial", 14, 20);
            
            // Subtítulo (Fechas)
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text(`Periodo: ${formatDateEs(fromDate)} al ${formatDateEs(toDate)}`, 14, 28);

            // Preparar datos para AutoTable
            const tableData = filteredDates.map(date => {
                const r = records[date];
                const formatToma = (t) => t && t.sys && t.dia ? `${t.sys}/${t.dia}` : '-';
                
                return [
                    formatDateEs(date),
                    formatToma(r.tomas[0]),
                    formatToma(r.tomas[1]),
                    formatToma(r.tomas[2]),
                    `${r.avgSys || '-'}/${r.avgDia || '-'}`,
                    r.avgPul || '-',
                    r.meds ? 'Sí' : 'No'
                ];
            });

            // Generar Tabla
            doc.autoTable({
                startY: 35,
                head: [['Fecha', '1ª Toma', '2ª Toma', '3ª Toma', 'Media Diaria', 'Pulso', 'Pastilla']],
                body: tableData,
                theme: 'grid',
                headStyles: { fillColor: [41, 128, 185], halign: 'center' },
                columnStyles: {
                    0: { halign: 'center', fontStyle: 'bold' },
                    1: { halign: 'center' },
                    2: { halign: 'center' },
                    3: { halign: 'center' },
                    4: { halign: 'center', fontStyle: 'bold', fillColor: [240, 248, 255] },
                    5: { halign: 'center' },
                    6: { halign: 'center' }
                },
                styles: { fontSize: 9 }
            });

            // Descargar PDF
            doc.save(`Tension_${fromDate}_al_${toDate}.pdf`);
        }

        function formatDateEs(dateStr) {
            if (!dateStr) return '';
            const p = dateStr.split('-');
            return `${p[2]}/${p[1]}/${p[0]}`;
        }

        // --- BACKUP ---
        function exportBackup() {
            const dataStr = JSON.stringify(records, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `Copia_Tension_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    // Mezclar datos (sobrescribe si existe el mismo día)
                    records = { ...records, ...importedData };
                    localStorage.setItem('tensionData', JSON.stringify(records));
                    
                    alert("✅ Datos importados correctamente.");
                    event.target.value = ''; // Resetear input file
                    
                    // Actualizar vista actual si es historial o calendario
                    if (document.getElementById('view-registro').classList.contains('active')) renderCalendar();
                    if (document.getElementById('view-historial').classList.contains('active')) renderHistory();
                    
                } catch (error) {
                    alert("❌ Archivo no válido. Asegúrate de que es un .json de esta aplicación.");
                }
            };
            reader.readAsText(file);
        }

        // --- INICIALIZACIÓN ---
        renderCalendar();
    </script>
</body>
</html>
